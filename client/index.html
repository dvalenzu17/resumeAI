<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Free ATS Resume Checker | Shortlisted</title>
    <meta name="description" content="Score your resume against any job description in 30 seconds. See exactly what keywords the ATS is rejecting you for. Free score, no account needed." />
    <link rel="canonical" href="https://getshortlisted.fyi" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0f0f0f" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://getshortlisted.fyi" />
    <meta property="og:title" content="Free ATS Resume Checker | Shortlisted" />
    <meta property="og:description" content="Score your resume against any job description in 30 seconds. See exactly what keywords you're missing. Free, no account required." />
    <meta property="og:site_name" content="Shortlisted" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Free ATS Resume Checker | Shortlisted" />
    <meta name="twitter:description" content="Score your resume against any job in 30 seconds. See exactly what keywords you're missing before you apply." />

    <!-- Structured Data: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Shortlisted",
      "url": "https://getshortlisted.fyi",
      "description": "ATS resume checker and optimizer. Score your resume against any job description in 30 seconds.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": [
        {
          "@type": "Offer",
          "name": "The Audit",
          "description": "Full ATS analysis with all keyword gaps, strengths, weaknesses, and LinkedIn headline rewrite.",
          "price": "12",
          "priceCurrency": "USD"
        },
        {
          "@type": "Offer",
          "name": "The Glow-Up",
          "description": "Full analysis plus AI bullet rewrites, cover letter, 8 interview questions with STAR answers, and salary intelligence.",
          "price": "29",
          "priceCurrency": "USD"
        }
      ]
    }
    </script>

    <!-- Structured Data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is my resume data safe?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your resume is processed server-side to generate your report. It is never sold, shared, or used to train AI models."
          }
        },
        {
          "@type": "Question",
          "name": "How accurate is the ATS score?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We use the same keyword-matching logic most corporate ATS systems use, plus an AI layer that catches semantic gaps. The scoring correlates well with what Workday, Greenhouse, and Lever flag."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need an account?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. You submit, you pay, you get the PDF in your inbox. No account required."
          }
        },
        {
          "@type": "Question",
          "name": "What if I am not happy with the report?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Email hello@getshortlisted.fyi and we will refund you. No questions asked."
          }
        }
      ]
    }
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
