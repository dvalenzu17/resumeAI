[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run db:generate && cd client && npm ci && npm run build"

[deploy]
startCommand = "npm run db:push && node --max-old-space-size=512 src/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
